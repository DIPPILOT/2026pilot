<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대구 AI SW 파일럿</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --primary-color: #3b82f6;
      /* Electric Blue */
      --secondary-color: #06b6d4;
      /* Neon Cyan */
      --bg-dark: #09090b;
      /* Deep Black */
      --bg-charcoal: #111827;
      /* Secondary Background */
      --bg-card: rgba(26, 29, 36, 0.75);
      /* Surface/Card: Glass dark */
      --text-main: #ffffff;
      --text-muted: #e4e4e7;
      --text-desc: #71717a;
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #06b6d4;
      --card-radius: 18px;
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.1);
      --shadow-md: 0 8px 30px rgba(59, 130, 246, 0.1), 0 0 1px rgba(255, 255, 255, 0.2);
      --glow-blue: 0 0 15px rgba(59, 130, 246, 0.35);
      --glow-cyan: 0 0 15px rgba(6, 182, 212, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 70px;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      color: var(--text-main);
      line-height: 1.65;
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%),
        linear-gradient(to bottom, #09090b 0%, #111827 100%);
      background-attachment: fixed;
    }

    h1, h2, h3, h4, p, li, span, strong {
      word-break: keep-all;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(9, 9, 11, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-container {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo::before {
      content: "";
      width: 8px;
      height: 20px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      border-radius: 999px;
      display: inline-block;
    }

    .nav-links-wrapper {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 22px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--secondary-color);
      text-shadow: var(--glow-cyan);
    }

    .user-credit-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.2);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffc107;
      box-shadow: 0 0 10px rgba(255, 193, 7, 0.15);
    }

    /* Hero Section */
    .hero {
      margin-top: 70px;
      padding: 60px 0 30px;
      text-align: center;
    }

    .hero-title {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 40%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    /* Top 3 Podium */
    .podium-container {
      padding: 30px 0 50px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .podium-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 30px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: all 0.3s;
      width: 250px;
    }

    .podium-card:hover {
      transform: translateY(-8px);
    }

    /* Podium relative heights */
    .podium-card.first {
      height: 350px;
      border-color: rgba(255, 193, 7, 0.3);
      box-shadow: 0 12px 40px rgba(255, 193, 7, 0.12);
      order: 2;
    }

    .podium-card.second {
      height: 290px;
      border-color: rgba(148, 163, 184, 0.3);
      box-shadow: 0 8px 30px rgba(148, 163, 184, 0.08);
      order: 1;
    }

    .podium-card.third {
      height: 270px;
      border-color: rgba(217, 119, 6, 0.3);
      box-shadow: 0 8px 30px rgba(217, 119, 6, 0.08);
      order: 3;
    }

    /* Crown / Medal */
    .podium-rank {
      position: absolute;
      top: -24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .first .podium-rank {
      background: linear-gradient(135deg, #ffe082, #ffc107);
      color: #7f5f00;
      border: 2px solid #ffe082;
      animation: pulse 2s infinite;
    }

    .second .podium-rank {
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      color: #334155;
      border: 2px solid #e2e8f0;
    }

    .third .podium-rank {
      background: linear-gradient(135deg, #ffedd5, #d97706);
      color: #7c2d12;
      border: 2px solid #ffedd5;
    }

    .podium-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #1e293b;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-top: 10px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .first .podium-avatar {
      width: 86px;
      height: 86px;
      border-color: #ffc107;
      box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
    }

    .podium-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .podium-team {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-desc);
      margin-bottom: 16px;
    }

    .podium-score {
      font-size: 1.3rem;
      font-weight: 800;
      color: #ffc107;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 14px;
    }

    .podium-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge-icon {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Ranking Grid Layout: Left Table, Right Widget */
    .ranking-section {
      padding: 20px 0 80px;
    }

    .ranking-layout {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 40px;
      align-items: start;
    }

    /* Control Panel */
    .filter-panel {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .search-wrapper {
      flex-grow: 1;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 18px;
      color: #ffffff;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.2);
    }

    .team-select {
      background: rgba(26, 29, 36, 0.95);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 18px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      min-width: 150px;
    }

    /* Leaderboard Table */
    .leaderboard-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .leaderboard-table th {
      background: rgba(9, 9, 11, 0.5);
      padding: 18px 24px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-desc);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }

    .leaderboard-table td {
      padding: 16px 24px;
      font-size: 0.92rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      vertical-align: middle;
    }

    .leaderboard-table tr:last-child td {
      border-bottom: none;
    }

    .leaderboard-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .leaderboard-table tr.my-rank td {
      background: rgba(59, 130, 246, 0.08);
      border-top: 1px solid rgba(59, 130, 246, 0.3);
      border-bottom: 1px solid rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }

    .my-rank-badge {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #93c5fd;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-left: 8px;
    }

    .rank-cell {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text-muted);
    }

    .student-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: #ffffff;
    }

    .my-rank .student-cell {
      color: #93c5fd;
    }

    .avatar-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .score-cell {
      font-weight: 800;
      color: #ffc107;
    }

    .trend-cell {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .trend-cell.up {
      color: #34d399;
    }

    .trend-cell.down {
      color: #f87171;
    }

    .trend-cell.flat {
      color: var(--text-desc);
    }

    /* Right Widget Panels */
    .widget-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--card-radius);
      padding: 30px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 30px;
    }

    .widget-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 20px;
      border-left: 3px solid var(--primary-color);
      padding-left: 10px;
      color: #ffffff;
    }

    .team-standing-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .team-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .team-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .team-avg-score {
      color: #ffc107;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s ease;
      width: 0%; /* Dynamic animation target */
    }

    .progress-bar-fill.alpha {
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
      box-shadow: var(--glow-cyan);
    }

    .progress-bar-fill.beta {
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
    }

    .progress-bar-fill.gamma {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
    }

    .progress-bar-fill.delta {
      background: linear-gradient(90deg, #10b981, #06b6d4);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
    }

    /* Keyframe animations */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(255, 193, 7, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 193, 7, 0);
      }
    }

    @media (max-width: 992px) {
      .ranking-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .podium-container {
        flex-direction: column;
        align-items: center;
      }

      .podium-card {
        width: 100%;
        max-width: 320px;
      }

      .podium-card.first {
        height: auto;
        order: 1;
      }

      .podium-card.second {
        height: auto;
        order: 2;
      }

      .podium-card.third {
        height: auto;
        order: 3;
      }

      .podium-rank {
        top: 15px;
        left: 15px;
      }
    }
  </style>
</head>

            </li>
          </ul>
        </div>
      </div>
    </div>
  </section>

    const myName = "강모세";

    // Process raw JSON entries to student objects
    function processData(data) {
      const teams = ["Alpha", "Beta", "Gamma", "Delta"];
      const trends = ["up", "down", "flat"];
      
      // Filter out withdrawn students, headers, and sum rows
      let filtered = data.filter(x => 
        x["순번"] && 
        x["순번"] !== "합계" && 
        !x["과정포기여부"] && 
        x["성명"]
      );

      // Convert scores to integer and sort
      let parsed = filtered.map(x => {
        const name = x["성명"];
        const scoreStr = (x["합계"] || "0").replace(/,/g, '');
        const score = parseInt(scoreStr, 10) || 0;
        return {
          name: name,
          score: score,
          isSelf: name === myName
        };
      });

      // Sort by score descending, then by name ascending (stable sort)
      parsed.sort((a, b) => {
        if (b.score !== a.score) {
          return b.score - a.score;
        }
        return a.name.localeCompare(b.name, 'ko');
      });

      // Assign Rank and other virtual parameters (teams, badges, trend)
      processedStudents = parsed.map((s, idx) => {
        const rank = idx + 1;
        const team = teams[idx % 4];
        
        // Dynamic badges based on score
        let badge = "🤝 소통형인재";
        if (s.score >= 5000) {
          badge = "👑 MVP 뱃지";
        } else if (s.score >= 3000) {
          badge = "⚡ 스피드왕";
        } else if (s.score >= 2500) {
          badge = "🔍 디버깅 귀재";
        }

        // Dynamic pseudo-trends
        let trend = "flat";
        let change = "";
        if (idx % 3 === 0) {
          trend = "up";
          change = `+${(idx % 2) + 1}`;
        } else if (idx % 5 === 0) {
          trend = "down";
          change = "-1";
        }

        return {
          rank: rank,
          name: s.name,
          score: s.score,
          team: team,
          badge: badge,
          trend: trend,
          change: change,
          isSelf: s.isSelf
        };
      });

      // Calculate Team Averages
      const teamSums = { "Alpha": 0, "Beta": 0, "Gamma": 0, "Delta": 0 };
      const teamCounts = { "Alpha": 0, "Beta": 0, "Gamma": 0, "Delta": 0 };

      processedStudents.forEach(s => {
        teamSums[s.team] += s.score;
        teamCounts[s.team]++;
      });

      teamStats = {};
      Object.keys(teamSums).forEach(team => {
        const count = teamCounts[team];
        teamStats[team] = count > 0 ? Math.round(teamSums[team] / count) : 0;
      });
    }

    // Render HTML Views
    function renderPage() {
      renderGNBAndSelfPanel();
      renderPodium();
      renderLeaderboard();
      renderTeamStandings();
    }

    function renderGNBAndSelfPanel() {
      const me = processedStudents.find(s => s.name === myName);
      if (me) {
        // Update GNB badge
        document.getElementById('userBadgeText').textContent = `${me.name} (${me.rank}위) | 🪙 ${me.score.toLocaleString()} Credits`;
        
        // Update Self panel widget
        document.getElementById('myGlobalRank').textContent = `${me.rank}위`;
        document.getElementById('myCredits').textContent = `🪙 ${me.score.toLocaleString()}`;
        document.getElementById('myAssignedTeam').textContent = `Team ${me.team}`;
        document.getElementById('myBadge').textContent = me.badge;
      }
    }

    function renderPodium() {
      const podiumContainer = document.getElementById('podiumContainer');
      podiumContainer.innerHTML = '';

      // Get Top 3
      const top3 = processedStudents.slice(0, 3);
      if (top3.length === 0) return;

      const avatars = ["🏆", "🥈", "🥉"];
      const classes = ["first", "second", "third"];
      const ranks = ["👑", "2", "3"];

      // Sort Top 3 elements for layout order: 2nd place (idx 1), 1st place (idx 0), 3rd place (idx 2)
      const layoutOrder = [];
      if (top3[1]) layoutOrder.push({ ...top3[1], cardClass: 'second', rankText: '2', avatar: '🥈' });
      if (top3[0]) layoutOrder.push({ ...top3[0], cardClass: 'first', rankText: '👑', avatar: '🏆' });
      if (top3[2]) layoutOrder.push({ ...top3[2], cardClass: 'third', rankText: '3', avatar: '🥉' });

      layoutOrder.forEach(p => {
        const card = document.createElement('div');
        card.className = `podium-card ${p.cardClass}`;
        card.innerHTML = `
          <div class="podium-rank">${p.rankText}</div>
          <div class="podium-avatar">${p.avatar}</div>
          <h4 class="podium-name">${p.name}</h4>
          <span class="podium-team">Team ${p.team}</span>
          <div class="podium-score">🪙 ${p.score.toLocaleString()}</div>
          <div class="podium-badges">
            <span class="badge-icon">${p.badge}</span>
          </div>
        `;
        podiumContainer.appendChild(card);
      });
    }

    function renderLeaderboard() {
      const searchVal = document.getElementById('rankSearch').value.trim();
      const teamVal = document.getElementById('teamSelect').value;
      const leaderboardBody = document.getElementById('leaderboardBody');
      leaderboardBody.innerHTML = '';

      // Filter
      const filtered = processedStudents.slice(3).filter(s => {
        const matchesSearch = s.name.includes(searchVal);
        const matchesTeam = teamVal === 'all' || s.team === teamVal;
        return matchesSearch && matchesTeam;
      });

      if (filtered.length === 0) {
        leaderboardBody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; padding: 40px 0; color: var(--text-desc);">
              검색 조건에 맞는 학생이 존재하지 않습니다.
            </td>
          </tr>
        `;
        return;
      }

      filtered.forEach(s => {
        let trendHTML = '➖';
        let trendClass = 'flat';
        if (s.trend === 'up') {
          trendHTML = `🔺 ${s.change}`;
          trendClass = 'up';
        } else if (s.trend === 'down') {
          trendHTML = `🔻 ${s.change}`;
          trendClass = 'down';
        }

        const row = document.createElement('tr');
        if (s.isSelf) {
          row.className = 'my-rank';
        }

        row.innerHTML = `
          <td class="rank-cell">${s.rank}위</td>
          <td>
            <div class="student-cell">
              <span class="avatar-sm">👤</span>
              <span>${s.name}</span>
              ${s.isSelf ? '<span class="my-rank-badge">나</span>' : ''}
            </div>
          </td>
          <td>Team ${s.team}</td>
          <td class="score-cell">🪙 ${s.score.toLocaleString()}</td>
          <td><span class="badge-icon">${s.badge}</span></td>
          <td class="trend-cell ${trendClass}">${trendHTML}</td>
        `;
        leaderboardBody.appendChild(row);
      });
    }

    function renderTeamStandings() {
      const teamStandingList = document.getElementById('teamStandingList');
      teamStandingList.innerHTML = '';

      // Sort teams by average score descending
      const sortedTeams = Object.keys(teamStats).map(name => ({
        name: name,
        avg: teamStats[name]
      })).sort((a, b) => b.avg - a.avg);

      // Max score to normalize percentage width (avoid division by 0)
      const maxScore = Math.max(...sortedTeams.map(t => t.avg), 1);

      sortedTeams.forEach((t, idx) => {
        const percent = Math.max(Math.round((t.avg / maxScore) * 100), 20); // Minimum 20% for visibility
        const barClass = t.name.toLowerCase();
        
        const row = document.createElement('div');
        row.className = 'team-row';
        row.innerHTML = `
          <div class="team-info">
            <span>${idx + 1}. Team ${t.name}</span>
            <span class="team-avg-score">🪙 ${t.avg.toLocaleString()}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill ${barClass}" style="width: ${percent}%;"></div>
          </div>
        `;
        teamStandingList.appendChild(row);
      });
    }

    // Filter Listeners
    document.getElementById('rankSearch').addEventListener('input', renderLeaderboard);
    document.getElementById('teamSelect').addEventListener('change', renderLeaderboard);

    // Initial Load
    fetch('data_json/credit_data.json')
      .then(res => res.json())
      .then(data => {
        processData(data);
        renderPage();
      })
      .catch(err => {
        console.warn('Dynamic fetch failed, utilizing pre-embedded fallback JSON data.', err);
        processData(fallbackData);
        renderPage();
      });
  </script>
</body>
